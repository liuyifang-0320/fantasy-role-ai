<html lang="zh-CN">

    <meta charset="UTF-8" />
    <script>
      const coverSupport = 'CSS' in window && typeof CSS.supports === 'function' && (CSS.supports('top: env(a)') || CSS.supports('top: constant(a)'))

        '<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=' +
          (coverSupport ? 'cover' : 'auto') +
          '" />'
      )
    </script>
    <title>幻梦数字人</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
