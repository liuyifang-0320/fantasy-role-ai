name: Deploy personal site

on:
  push:
    branches: [main]
    paths:
      - "personal-site/**"
      - ".github/workflows/personal-site-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "personal-site-pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: personal-site/package-lock.json
      - name: Install dependencies
        working-directory: personal-site
        run: npm ci
      - name: Build
        working-directory: personal-site
        run: npm run build
      - name: Add nojekyll marker
        run: touch personal-site/dist/.nojekyll
      - name: Publish gh-pages branch
        working-directory: personal-site/dist
        run: |
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy personal site"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push --force origin gh-pages
